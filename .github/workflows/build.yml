name: Build DLL x86

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          
      - name: Install CMake
        shell: pwsh
        run: choco install cmake -y

      - name: Install DirectX SDK
        shell: pwsh
        run: choco install directx-sdk -y

      - name: Refresh Environment
        shell: pwsh
        run: refreshenv

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution x86
        shell: cmd
        run: |
          msbuild "Source\D3D9 Hook ImGui.sln" ^
            /p:Configuration=Release ^
            /p:Platform=x86 ^
            /p:IncludePath="%DXSDK_DIR%Include;%IncludePath%" ^
            /p:LibraryPath="%DXSDK_DIR%Lib\x86;%LibraryPath%" ^
            /m

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v6
        with:
          name: DLL
          path: "Source/D3D9 Hook ImGui/Release/D3D9 Hook ImGui.dll"
