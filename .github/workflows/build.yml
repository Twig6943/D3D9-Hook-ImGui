name: Build DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v6
    with:
      submodules: recursive

      - name: Install Visual Studio Build Tools
        shell: pwsh
        run: |
          choco install visualstudio2026buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended" `
            -y
          choco install cmake -y

      - name: Build
        shell: cmd
        run: |
          call "%ProgramFiles(x86)%\Microsoft Visual Studio\2026\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          cd DLL
          mkdir build
          cd build
          cmake .. -G "Visual Studio 18 2026"
          cmake --build . --config Release
          dir

      - name: Upload artifact/s
        uses: actions/upload-artifact@v6
        with:
          name: DLL
          path: |
            Source/D3D9 Hook ImGui/Release/D3D9 Hook ImGui.dll
